name: ai_learning_player
description: AI点评模式者自用方法\n
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  shared_preferences: ^2.2.2
  video_player: ^2.8.1
  chewie: ^1.7.1
  path_provider: ^2.1.1
  file_picker: ^6.1.1
  permission_handler: ^11.0.1
  dio: ^5.4.0
  flutter_screenutil: ^5.9.0
  fl_chart: ^0.66.0
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  timeline_tile: ^2.0.0
  percent_indicator: ^4.2.3
  confetti: ^0.7.0
  lottie: ^2.7.0
  intl: ^0.18.1
  uuid: ^4.2.1
  path: ^1.8.3
  json_annotation: ^4.8.1
  freezed_annotation: ^2.4.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.5

flutter:
  uses-material-design: true
  assets:
    - assets/config/
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/data/
